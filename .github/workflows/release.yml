name: Release

# Fires on a tag push matching v*.*.*[-suffix]. Builds a notarized DMG,
# signs it with Sparkle's EdDSA key, updates docs/appcast.xml, and
# publishes a GitHub Release with the DMG attached.
#
# Required repo secrets:
#   DEVELOPER_ID_P12_BASE64    — base64 of the exported .p12
#   DEVELOPER_ID_P12_PASSWORD  — password chosen at export time
#   KEYCHAIN_PASSWORD          — any random string for the temp keychain
#   APPLE_ID                   — Apple ID email
#   APPLE_TEAM_ID              — 10-char team id
#   APPLE_APP_PASSWORD         — app-specific password from appleid.apple.com
#   SPARKLE_ED_PRIVATE_KEY     — base64 private key from `generate_keys -x`

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, sign, publish
    runs-on: macos-14

    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout (full history for pushing appcast back)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Derive version number
        id: version
        run: |
          VERSION="${TAG#v}"
          # Sparkle compares <sparkle:version> (a monotonic integer) against
          # the installed CFBundleVersion, not the marketing string. Pull
          # CURRENT_PROJECT_VERSION straight out of project.yml so the feed
          # and the bundle agree.
          BUILD=$(awk '/CURRENT_PROJECT_VERSION:/ {gsub(/"/, "", $2); print $2; exit}' Birchboard/project.yml)
          if [ -z "$BUILD" ]; then
            echo "Could not read CURRENT_PROJECT_VERSION from Birchboard/project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Deriving release for version $VERSION (build $BUILD)"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Sparkle CLI tools
        run: |
          # sign_update and related bins live inside the Sparkle distribution.
          curl -sSL -o sparkle.tar.xz \
              "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz"
          mkdir -p .sparkle
          tar -xJf sparkle.tar.xz -C .sparkle
          echo "$PWD/.sparkle/bin" >> "$GITHUB_PATH"
          ls .sparkle/bin

      - name: Create temporary keychain and import Developer ID cert
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          security import "$RUNNER_TEMP/cert.p12" \
              -k "$KEYCHAIN" \
              -P "$P12_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security

          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Put our keychain first in the search list without losing the
          # system keychain (which holds the Developer ID intermediate).
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          rm -f "$RUNNER_TEMP/cert.p12"

          # Verify the Developer ID Application identity is now visible.
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Seed Signing.xcconfig for CI
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > Birchboard/Config/Signing.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_STYLE = Automatic
          CODE_SIGN_IDENTITY = Apple Development
          EOF

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          xcrun notarytool store-credentials ci-notary \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --keychain "$KEYCHAIN"

      - name: Build, notarize, staple DMG
        working-directory: Birchboard
        env:
          NOTARY_PROFILE: ci-notary
          KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
        run: |
          # make-dmg.sh consults NOTARY_PROFILE; it expects the keychain to
          # be unlocked and the Developer ID identity to be resolvable —
          # both true after the import step above.
          # Capture stdout so a failed notarization still lets us pull
          # the submission id for the log step.
          set -o pipefail
          ./scripts/make-dmg.sh 2>&1 | tee "$RUNNER_TEMP/makedmg.log"

      - name: Dump notarization log on failure
        if: failure()
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
        run: |
          LOG="$RUNNER_TEMP/makedmg.log"
          [ -f "$LOG" ] || { echo "no makedmg.log"; exit 0; }
          SUBID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$LOG" | head -1)
          if [ -z "$SUBID" ]; then
            echo "No notarization submission id found in makedmg.log"
            exit 0
          fi
          echo "Fetching log for notary submission $SUBID"
          xcrun notarytool log "$SUBID" \
              --keychain-profile ci-notary \
              --keychain "$KEYCHAIN_PATH" \
              /dev/stdout || true

      - name: Rename DMG with version
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SRC="Birchboard/build/Birchboard.dmg"
          DST="Birchboard/build/Birchboard-$VERSION.dmg"
          mv "$SRC" "$DST"
          SIZE=$(stat -f %z "$DST")
          echo "path=$DST" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "filename=Birchboard-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Sign update with Sparkle EdDSA key
        id: sparkle
        env:
          ED_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # sign_update -f <key-file> <dmg>  → prints the
          # sparkle:edSignature="…" length="…" attributes on a single line.
          KEY_FILE="$RUNNER_TEMP/sparkle.key"
          printf '%s' "$ED_KEY" > "$KEY_FILE"
          RAW=$(sign_update -f "$KEY_FILE" "${{ steps.dmg.outputs.path }}")
          rm -f "$KEY_FILE"
          echo "sign_update output: $RAW"
          # Capture the signature value for appcast building.
          SIG=$(echo "$RAW" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')
          echo "signature=$SIG" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Sparkle renders the appcast item's <description> as HTML in its
          # "Update Available" dialog. Two sources, in priority order:
          #
          #   1. docs/release-notes/<version>.html — verbatim override the
          #      user committed alongside the version bump. Used when the
          #      auto-derived bullets aren't expressive enough.
          #   2. git log between the previous tag and this one, filtered to
          #      drop the "Bump to X.Y.Z" and "Update appcast" housekeeping
          #      commits. One <li> per surviving subject.
          OVERRIDE="docs/release-notes/${VERSION}.html"
          OUT="$RUNNER_TEMP/release-notes.html"

          if [ -f "$OVERRIDE" ]; then
              echo "Using override: $OVERRIDE"
              cp "$OVERRIDE" "$OUT"
          else
              # `git describe --abbrev=0 $TAG^` resolves the most recent
              # ancestor tag of the tagged commit's parent. Equivalent to
              # "the tag right before this one in history."
              PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
              echo "Auto-deriving notes from commit log${PREV:+ since $PREV}"

              if [ -z "$PREV" ]; then
                  RANGE="$TAG"
              else
                  RANGE="$PREV..$TAG"
              fi

              # Subjects → escaped <li> lines. We script in a temp file so
              # the subjects can flow on stdin without colliding with the
              # heredoc that supplies the script source. The python step
              # both filters housekeeping commits AND escapes HTML special
              # chars so a subject like "Allow & in JWT payloads" doesn't
              # break the appcast XML.
              SCRIPT="$RUNNER_TEMP/compose-notes.py"
              cat > "$SCRIPT" <<'PY'
          import html, sys
          items = []
          for s in sys.stdin.read().splitlines():
              s = s.strip()
              if not s: continue
              if s.startswith("Bump to "): continue
              if s.startswith("Update appcast"): continue
              items.append("    <li>" + html.escape(s) + "</li>")
          if items:
              print("<ul>")
              print("\n".join(items))
              print("</ul>")
          else:
              print("<p>Maintenance release.</p>")
          PY
              git log --no-merges --pretty='format:%s' $RANGE \
                  | python3 "$SCRIPT" > "$OUT"
          fi

          echo "Composed release notes:"
          cat "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Build updated appcast entry (staged in tmp)
        id: appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          DMG_FILENAME: ${{ steps.dmg.outputs.filename }}
          DMG_SIZE: ${{ steps.dmg.outputs.size }}
          SIGNATURE: ${{ steps.sparkle.outputs.signature }}
          NOTES_PATH: ${{ steps.notes.outputs.path }}
        run: |
          # Stage the new appcast to $RUNNER_TEMP so it survives the
          # branch switch in the next step.
          STAGED="$RUNNER_TEMP/appcast.xml"
          PUBDATE=$(LC_TIME=en_US.UTF-8 date "+%a, %d %b %Y %H:%M:%S %z")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/$DMG_FILENAME"
          NOTES_HTML=$(cat "$NOTES_PATH")

          ITEM=$(cat <<EOF
              <item>
                  <title>Version $VERSION</title>
                  <pubDate>$PUBDATE</pubDate>
                  <sparkle:version>$BUILD</sparkle:version>
                  <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                  <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                  <link>https://github.com/${{ github.repository }}/releases/tag/v$VERSION</link>
                  <description><![CDATA[
          $NOTES_HTML
                      <p style="font-size:smaller;color:#888;">Full notes: <a href="https://github.com/${{ github.repository }}/releases/tag/v$VERSION">v$VERSION on GitHub</a>.</p>
                  ]]></description>
                  <enclosure
                      url="$DOWNLOAD_URL"
                      sparkle:edSignature="$SIGNATURE"
                      length="$DMG_SIZE"
                      type="application/octet-stream"
                  />
              </item>
          EOF
          )

          # Seed from main's existing appcast if it has one, otherwise
          # start fresh. Fetching explicitly so we work from the
          # authoritative branch, not the tag.
          git fetch origin main --depth=1
          if git cat-file -e origin/main:docs/appcast.xml 2>/dev/null; then
            git show origin/main:docs/appcast.xml > "$STAGED"
            VERSION="$VERSION" python3 - "$ITEM" "$STAGED" <<'PY'
          import os, re, sys, pathlib
          item, path = sys.argv[1], pathlib.Path(sys.argv[2])
          version = os.environ["VERSION"]
          xml = path.read_text()

          # Idempotent: if an <item> already exists for this version,
          # drop it so the fresh one replaces it (re-running a release
          # workflow must not produce duplicate entries).
          xml = re.sub(
              r"\s*<item>(?:(?!</item>).)*?<sparkle:version>"
              + re.escape(version)
              + r"</sparkle:version>.*?</item>\s*",
              "\n        ",
              xml,
              count=1,
              flags=re.DOTALL,
          )

          # Insert the new item just before </channel> so channel
          # metadata stays above items.
          new = re.sub(
              r"(\s*)(</channel>)",
              "\n" + item + r"\1\2",
              xml,
              count=1,
          )
          path.write_text(new)
          PY
          else
            cat > "$STAGED" <<HEADER
          <?xml version="1.0" standalone="yes"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
              <channel>
                  <title>Birchboard</title>
                  <link>https://birchsport.github.io/clipboard-manager/appcast.xml</link>
                  <description>Birchboard update feed</description>
                  <language>en</language>
          $ITEM
              </channel>
          </rss>
          HEADER
          fi

          echo "Staged appcast:"
          cat "$STAGED"
          echo "staged=$STAGED" >> "$GITHUB_OUTPUT"

      - name: Commit updated appcast back to main
        env:
          STAGED: ${{ steps.appcast.outputs.staged }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fresh clone of main in a separate worktree — keeps the tagged
          # working tree untouched (the DMG path is still referenced by
          # the release step below).
          git worktree add "$RUNNER_TEMP/main-worktree" origin/main
          mkdir -p "$RUNNER_TEMP/main-worktree/docs"
          cp "$STAGED" "$RUNNER_TEMP/main-worktree/docs/appcast.xml"
          cd "$RUNNER_TEMP/main-worktree"
          git add docs/appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit"
          else
            git commit -m "Update appcast for ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Birchboard ${{ steps.version.outputs.version }}
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          make_latest: true
