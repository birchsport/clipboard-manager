name: Birchboard
options:
  bundleIdPrefix: dev.birch
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.2.4"
    CURRENT_PROJECT_VERSION: "6"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Birchboard:
    type: application
    platform: macOS
    sources:
      - path: Birchboard
        excludes:
          - "Info.plist"
          - "Birchboard.entitlements"
    info:
      path: Birchboard/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Birchboard
        CFBundleDisplayName: Birchboard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: "Birchboard sends ⌘V to the previously focused app after you pick an entry from the panel."
        NSPrincipalClass: NSApplication
        SUPublicEDKey: J6RzBA7GOuhU8TYeIyxmQl2b46hJGuwVNgTMrIj12oE=
        SUFeedURL: "https://birchsport.github.io/clipboard-manager/appcast.xml"
        SUEnableInstallerLauncherService: true
        SUEnableDownloaderService: true
        SUScheduledCheckInterval: 86400
        SUEnableAutomaticChecks: true
    entitlements:
      path: Birchboard/Birchboard.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.birch.Birchboard
        PRODUCT_NAME: Birchboard
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Birchboard/Birchboard.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        # Debug inherits the Apple Development identity from Signing.xcconfig
        # with automatic signing — fine for running locally on your own Mac.
        #
        # Release switches to manual signing with a Developer ID Application
        # cert so the build can be notarized and distributed to other Macs.
        # Automatic + a specific identity is rejected by Xcode ("conflicting
        # provisioning settings"), so we set STYLE=Manual and explicitly
        # clear the provisioning profile — Developer ID archives don't need
        # one.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: ""
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
      - package: Splash
      - package: Yams
      - package: Sparkle
