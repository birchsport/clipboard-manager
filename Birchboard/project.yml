name: Birchboard
options:
  bundleIdPrefix: dev.birch
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  Birchboard:
    type: application
    platform: macOS
    sources:
      - path: Birchboard
        excludes:
          - "Info.plist"
          - "Birchboard.entitlements"
    info:
      path: Birchboard/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Birchboard
        CFBundleDisplayName: Birchboard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: "Birchboard sends ⌘V to the previously focused app after you pick an entry from the panel."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Birchboard/Birchboard.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.birch.Birchboard
        PRODUCT_NAME: Birchboard
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Birchboard/Birchboard.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        # Debug inherits the Apple Development identity from Signing.xcconfig —
        # fine for running locally on your own Mac.
        # Release uses Developer ID Application so the DMG can be notarized
        # and distributed to other Macs. Requires that cert be in the keychain.
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
